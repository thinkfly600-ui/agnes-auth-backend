<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI瑙嗛鍒涗綔宸ュ叿 - 鍏嶈垂婵€娲?/title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
}
.card {
    background: white; border-radius: 20px; padding: 32px 28px;
    max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.icon { font-size: 40px; text-align: center; margin-bottom: 4px; }
h1 { text-align: center; font-size: 22px; color: #333; margin-bottom: 4px; }
.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }

/* QR Section */
.qr-section {
    text-align: center; background: #fdf6f0; border: 1px solid #f0c8a0;
    border-radius: 12px; padding: 16px; margin-bottom: 20px;
}
.qr-section .qr-title { color: #e65100; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.qr-section img { width: 140px; height: 140px; border-radius: 8px; border: 2px solid #fff; }
.qr-section .qr-steps { color: #666; font-size: 12px; margin-top: 8px; line-height: 1.8; text-align: left; padding-left: 8px; }

.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: 500; }
.input-group input {
    width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 10px;
    font-size: 15px; transition: border-color 0.2s; outline: none;
}
.input-group input:focus { border-color: #667eea; }
.btn {
    width: 100%; padding: 12px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    margin-bottom: 10px;
}
.btn-primary { background: #533483; color: white; }
.btn-primary:hover { background: #6b3fa0; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.result-box {
    margin-top: 16px; padding: 16px; border-radius: 10px; display: none;
}
.result-box.success { background: #e8f5e9; border: 1px solid #a5d6a7; display: block; }
.result-box.error { background: #ffebee; border: 1px solid #ef9a9a; display: block; color: #c62828; }
.code-display {
    font-size: 26px; font-weight: 700; letter-spacing: 2px; color: #2e7d32;
    font-family: "Courier New", monospace; margin: 8px 0;
}
.expires { color: #666; font-size: 12px; margin-top: 4px; }
.reminder { text-align: center; color: #aaa; font-size: 11px; margin-top: 16px; }
.spinner { display: none; margin: 10px auto; width: 22px; height: 22px; border: 3px solid #e0e0e0; border-top-color: #533483; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
    <div class="icon">馃幀</div>
    <h1>AI瑙嗛鍒涗綔宸ュ叿</h1>
    <p class="sub">鍏嶈垂婵€娲伙紝鐣呬韩AI瑙嗛鍒涗綔</p>

    <!-- QR Code -->
    <div class="qr-section">
        <div class="qr-title">馃搶 鎵爜鍔犲井淇＄兢</div>
        <img src="/static/assets/qr_code.png" alt="寰俊缇や簩缁寸爜" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div style="display:none;color:#aaa;font-size:12px">浜岀淮鐮佸姞杞戒腑...</div>
        <div class="qr-steps">
            鈶?鎵爜鍔犲叆寰俊缇?br>
            鈶?缇ゅ唴缃《娑堟伅鏈夋縺娲婚摼鎺?br>
            鈶?鍥炲埌姝ら〉闈㈣幏鍙栨縺娲荤爜
        </div>
    </div>

    <div class="input-group">
        <label>馃摫 鎵嬫満鍙风爜</label>
        <input type="tel" id="phone" placeholder="璇疯緭鍏?1浣嶆墜鏈哄彿" maxlength="11">
    </div>

    <button class="btn btn-primary" id="getCodeBtn" onclick="getCode()">鑾峰彇鍏嶈垂婵€娲荤爜</button>
    <div class="spinner" id="spinner"></div>

    <div class="result-box" id="result">
        <div id="resultContent"></div>
    </div>

    <p class="reminder">婵€娲诲悗鏈夋晥鏈?骞?| 鍒版湡鍙噸鏂版縺娲?/p>
</div>

<script>
async function getCode() {
    const phone = document.getElementById('phone').value.trim();
    if (!/^1\d{10}$/.test(phone)) {
        showResult('璇疯緭鍏ユ纭殑11浣嶆墜鏈哄彿', 'error');
        return;
    }
    
    const btn = document.getElementById('getCodeBtn');
    const spinner = document.getElementById('spinner');
    btn.disabled = true;
    spinner.style.display = 'block';
    document.getElementById('result').className = 'result-box';
    
    try {
        const resp = await fetch('/api/get-code', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({phone: phone})
        });
        const data = await resp.json();
        
        if (resp.ok && data.code) {
            const msgType = data.is_new ? '婵€娲荤爜宸茬敓鎴? : '鎮ㄥ凡棰嗗彇杩囨縺娲荤爜';
            showResult(`
                <p style="color:#2e7d32;font-weight:600;">鉁?${msgType}</p>
                <div class="code-display">${data.code}</div>
                <p class="expires">馃搮 鍒版湡鏃? ${data.expires_at}</p>
                <p style="color:#666;font-size:12px;margin-top:10px;line-height:1.6;">
                    璇峰湪杞欢涓緭鍏ヤ互涓婃縺娲荤爜瀹屾垚婵€娲汇€?br>
                    璇峰Ε鍠勪繚绠★紝涓嶈娉勯湶缁欎粬浜恒€?                </p>
            `, 'success');
        } else {
            showResult(data.error || '鑾峰彇澶辫触锛岃閲嶈瘯', 'error');
        }
    } catch (e) {
        showResult('缃戠粶閿欒锛岃妫€鏌ョ綉缁滃悗閲嶈瘯', 'error');
    } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
    }
}

function showResult(html, type) {
    const box = document.getElementById('result');
    box.className = 'result-box ' + type;
    document.getElementById('resultContent').innerHTML = html;
}
</script>
</body>
</html>
