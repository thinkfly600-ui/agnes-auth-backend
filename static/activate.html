<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI全驱数字人视频营销系统 - 免费激活</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: white; border-radius: 20px; padding: 32px 28px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
h1 { text-align: center; font-size: 22px; color: #333; margin-bottom: 4px; }
.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
.qr-section { text-align: center; background: #fdf6f0; border: 1px solid #f0c8a0; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
.qr-title { color: #e65100; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.qr-section img { width: 140px; height: 140px; border-radius: 8px; }
.qr-steps { color: #666; font-size: 12px; margin-top: 8px; line-height: 1.8; text-align: left; padding-left: 8px; }
.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
.input-group input { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; }
.input-group input:focus { border-color: #667eea; }
.btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
.btn-primary { background: #533483; color: white; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.result-box { margin-top: 16px; padding: 16px; border-radius: 10px; display: none; }
.result-box.success { background: #e8f5e9; border: 1px solid #a5d6a7; display: block; }
.result-box.error { background: #ffebee; border: 1px solid #ef9a9a; display: block; color: #c62828; }
.code-display { font-size: 26px; font-weight: 700; letter-spacing: 2px; color: #2e7d32; font-family: monospace; margin: 8px 0; }
.expires { color: #666; font-size: 12px; margin-top: 4px; }
.reminder { text-align: center; color: #aaa; font-size: 11px; margin-top: 16px; }
.spinner { display: none; margin: 10px auto; width: 22px; height: 22px; border: 3px solid #e0e0e0; border-top-color: #533483; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
    <div style="font-size:40px;text-align:center">🎬</div>
    <h1>AI全驱数字人视频营销系统</h1>
    <p class="sub">免费激活，畅享AI视频创作</p>
    <div class="qr-section">
        <div class="qr-title">📌 扫码加微信群</div>
        <img src="/static/assets/qr_code.png" alt="微信群二维码">
        <div class="qr-steps">① 扫码加入微信群<br>② 群内置顶消息有激活链接<br>③ 回到此页面获取激活码</div>
    </div>
    <div class="input-group">
        <label>📱 手机号码</label>
        <input type="tel" id="phone" placeholder="请输入11位手机号" maxlength="11">
    </div>
    <button class="btn btn-primary" id="getCodeBtn" onclick="getCode()">获取免费激活码</button>
    <div class="spinner" id="spinner"></div>
    <div class="result-box" id="result"><div id="resultContent"></div></div>
    <p class="reminder">激活后有效期1年 | 到期可重新激活</p>
</div>
<script>
async function getCode() {
    var phone = document.getElementById('phone').value.trim();
    if (!/^1\d{10}$/.test(phone)) { showResult('请输入正确的11位手机号', 'error'); return; }
    var btn = document.getElementById('getCodeBtn');
    var spinner = document.getElementById('spinner');
    btn.disabled = true; spinner.style.display = 'block';
    document.getElementById('result').className = 'result-box';
    try {
        var resp = await fetch('/api/get-code', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone:phone}) });
        var data = await resp.json();
        if (resp.ok && data.code) {
            var msg = data.is_new ? '激活码已生成' : '您已领取过激活码';
            showResult('<p style="color:#2e7d32;font-weight:600">✅ '+msg+'</p><div class="code-display">'+data.code+'</div><p class="expires">📅 到期日: '+data.expires_at+'</p><p style="color:#666;font-size:12px;margin-top:10px">请在软件中输入以上激活码完成激活。</p>', 'success');
        } else { showResult(data.error || '获取失败，请重试', 'error'); }
    } catch(e) { showResult('网络错误，请重试', 'error'); }
    btn.disabled = false; spinner.style.display = 'none';
}
function showResult(html, type) { document.getElementById('result').className = 'result-box '+type; document.getElementById('resultContent').innerHTML = html; }
</script>
</body>
</html>
