<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI视频创作工具 - 免费激活</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
}
.card {
    background: white; border-radius: 20px; padding: 40px 30px;
    max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
}
.icon { font-size: 48px; margin-bottom: 10px; }
h1 { font-size: 24px; color: #333; margin-bottom: 6px; }
.sub { color: #888; font-size: 14px; margin-bottom: 30px; }
.input-group { margin-bottom: 20px; text-align: left; }
.input-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }
.input-group input {
    width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 12px;
    font-size: 16px; transition: border-color 0.2s; outline: none;
}
.input-group input:focus { border-color: #667eea; }
.btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    margin-bottom: 12px;
}
.btn-primary { background: #667eea; color: white; }
.btn-primary:hover { background: #5a6fd6; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-success { background: #4caf50; color: white; }
.btn-success:hover { background: #43a047; }
.result-box {
    margin-top: 20px; padding: 20px; border-radius: 12px; display: none;
}
.result-box.success { background: #e8f5e9; border: 1px solid #a5d6a7; display: block; }
.result-box.error { background: #ffebee; border: 1px solid #ef9a9a; display: block; color: #c62828; }
.code-display {
    font-size: 28px; font-weight: 700; letter-spacing: 2px; color: #2e7d32;
    font-family: "Courier New", monospace; margin: 10px 0;
}
.expires { color: #666; font-size: 13px; margin-top: 6px; }
.reminder { color: #888; font-size: 12px; margin-top: 30px; }
.spinner { display: none; margin: 10px auto; width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
    <div class="icon">🎬</div>
    <h1>AI视频创作工具</h1>
    <p class="sub">输入手机号，免费获取激活码<br>有效期1年</p>

    <div class="input-group">
        <label>📱 手机号码</label>
        <input type="tel" id="phone" placeholder="请输入11位手机号" maxlength="11" pattern="[0-9]{11}">
    </div>

    <button class="btn btn-primary" id="getCodeBtn" onclick="getCode()">获取免费激活码</button>
    <div class="spinner" id="spinner"></div>

    <div class="result-box" id="result">
        <div id="resultContent"></div>
    </div>

    <p class="reminder">请先加入微信群，再从群内打开此链接</p>
</div>

<script>
async function getCode() {
    const phone = document.getElementById('phone').value.trim();
    if (!/^1\d{10}$/.test(phone)) {
        showResult('请输入正确的11位手机号', 'error');
        return;
    }
    
    const btn = document.getElementById('getCodeBtn');
    const spinner = document.getElementById('spinner');
    btn.disabled = true;
    spinner.style.display = 'block';
    document.getElementById('result').className = 'result-box';
    
    try {
        const resp = await fetch('/api/get-code', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({phone: phone})
        });
        const data = await resp.json();
        
        if (resp.ok && data.code) {
            const msgType = data.is_new ? '激活码已生成' : '您已领取过激活码';
            showResult(`
                <p style="color:#2e7d32;font-weight:600;">✅ ${msgType}</p>
                <div class="code-display">${data.code}</div>
                <p class="expires">📅 到期日: ${data.expires_at}</p>
                <p style="color:#666;font-size:13px;margin-top:12px;line-height:1.6;">
                    请在软件中输入以上激活码完成激活。<br>
                    请妥善保管，不要泄露给他人。<br>
                    到期后可重新领取。
                </p>
            `, 'success');
        } else {
            showResult(data.error || '获取失败，请重试', 'error');
        }
    } catch (e) {
        showResult('网络错误，请检查网络后重试', 'error');
    } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
    }
}

function showResult(html, type) {
    const box = document.getElementById('result');
    box.className = 'result-box ' + type;
    document.getElementById('resultContent').innerHTML = html;
}
</script>
</body>
</html>
