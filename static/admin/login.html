<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #16213e; border-radius: 16px; padding: 48px 40px; width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); text-align: center; }
h1 { color: #e0e0e0; font-size: 24px; margin-bottom: 8px; }
.sub { color: #888; font-size: 13px; margin-bottom: 32px; }
input { width: 100%; padding: 14px 16px; border: 1px solid #2a2a4a; border-radius: 10px; background: #0f3460; color: #e0e0e0; font-size: 16px; outline: none; margin-bottom: 20px; }
input:focus { border-color: #533483; }
button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #533483; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
button:hover { background: #6b3fa0; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; min-height: 20px; }
</style>
</head>
<body>
<div class="card">
    <h1>🔐 管理后台</h1>
    <p class="sub">AI视频创作工具</p>
    <input type="password" id="pwd" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')login()">
    <div class="error" id="error"></div>
    <button id="btn" onclick="login()">登 录</button>
</div>

<script>
async function login() {
    const pwd = document.getElementById('pwd').value;
    if (!pwd) { document.getElementById('error').textContent = '请输入密码'; return; }
    const btn = document.getElementById('btn'); btn.disabled = true;
    try {
        const resp = await fetch('/admin/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd}) });
        const data = await resp.json();
        if (data.success) { window.location.href = '/admin/dashboard'; }
        else { document.getElementById('error').textContent = data.error; }
    } catch(e) { document.getElementById('error').textContent = '网络错误'; }
    btn.disabled = false;
}
</script>
</body>
</html>
