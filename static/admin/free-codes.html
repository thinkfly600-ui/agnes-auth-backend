<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 免费码管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6fa; min-height: 100vh; }
nav { background: #1a1a2e; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; color: white; }
nav h2 { font-size: 18px; }
nav .links { display: flex; gap: 24px; }
nav .links a { color: #aaa; text-decoration: none; font-size: 14px; }
nav .links a:hover, nav .links a.active { color: white; }
nav button { background: #e74c3c; color: white; border: none; border-radius: 6px; padding: 6px 16px; cursor: pointer; font-size: 13px; }
.container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
.card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px; }
.card h3 { font-size: 16px; color: #333; margin-bottom: 12px; }
.toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.toolbar input, .toolbar select, .toolbar button { padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
.toolbar button { cursor: pointer; font-weight: 500; }
.btn-primary { background: #533483; color: white; border-color: #533483; }
.btn-danger { background: #e74c3c; color: white; border-color: #e74c3c; }
.btn-outline { background: white; color: #333; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #eee; color: #888; font-size: 13px; font-weight: 500; }
td { padding: 10px 12px; border-bottom: 1px solid #f5f5f5; font-size: 13px; color: #444; }
.code-cell { font-family: "Courier New", monospace; font-size: 13px; }
.badge { padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge-unused { background: #e8f5e9; color: #2e7d32; }
.badge-used { background: #e3f2fd; color: #1565c0; }
.badge-expired { background: #ffebee; color: #c62828; }
.badge-free { background: #e3f2fd; color: #1565c0; }
.badge-vip { background: #fff3e0; color: #e65100; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
.modal.show { display: flex; }
.modal-box { background: white; border-radius: 16px; padding: 32px; width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal-box h3 { margin-bottom: 16px; }
.modal-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 14px; outline: none; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
.toast { position: fixed; top: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
.pagination { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
.pagination button { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; }
.pagination button.active { background: #533483; color: white; border-color: #533483; }
.spinner { width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<nav>
    <h2>🎫 免费码管理</h2>
    <div class="links">
        <a href="/admin/dashboard">仪表盘</a>
        <a href="/admin/vip-codes">VIP码管理</a>
        <a href="/admin/free-codes" class="active">免费码管理</a>
        <a href="/admin/free-users">用户列表</a>
    </div>
    <button onclick="logout()">退出登录</button>
</nav>
<div class="container">
    <div class="card">
        <h3>🔧 批量生成免费激活码</h3>
        <div class="toolbar">
            <input type="number" id="genCount" value="10" min="1" max="500" style="width:80px">
            <button class="btn-primary" onclick="generateCodes()">生成免费码</button>
            <input type="text" id="genNote" placeholder="备注（如：7月活动批次）" style="width:200px">
            <button class="btn-outline" onclick="exportCSV()">📥 导出CSV</button>
        </div>
    </div>
    <div class="card">
        <h3>📋 免费码列表</h3>
        <div class="toolbar">
            <select id="filterStatus" onchange="loadCodes(1)">
                <option value="">全部状态</option>
                <option value="unused">未使用</option>
                <option value="used">已使用</option>
                <option value="expired">已过期</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜索激活码或手机号..." style="width:220px" onkeydown="if(event.key==='Enter')loadCodes(1)">
            <button onclick="loadCodes(1)">🔍 搜索</button>
        </div>
        <div id="codeTable"><div class="spinner"></div></div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<div class="modal" id="genModal">
    <div class="modal-box">
        <h3>✅ 生成结果</h3>
        <div id="genResult" style="max-height:400px;overflow-y:auto;font-family:monospace;font-size:13px;line-height:2;"></div>
        <div class="modal-btns">
            <button class="btn-outline" onclick="copyGenResult()">📋 一键复制</button>
            <button class="btn-primary" onclick="document.getElementById('genModal').classList.remove('show');loadCodes(1)">关闭</button>
        </div>
    </div>
</div>

<div class="modal" id="assignModal">
    <div class="modal-box">
        <h3>📋 分配激活码</h3>
        <div style="font-family:monospace;font-size:14px;margin-bottom:12px" id="assignCode"></div>
        <label style="font-size:13px;color:#555">📱 客户手机号</label>
        <input type="tel" id="assignPhone" placeholder="11位手机号" maxlength="11">
        <div class="modal-btns">
            <button class="btn-outline" onclick="document.getElementById('assignModal').classList.remove('show')">取消</button>
            <button class="btn-primary" onclick="doAssign()">确认分配</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentPage = 1, assignTarget = '';

async function loadCodes(page) {
    currentPage = page;
    const params = new URLSearchParams({page, status: document.getElementById('filterStatus').value, search: document.getElementById('searchInput').value.trim()});
    try {
        const resp = await fetch('/admin/api/free-codes?' + params);
        if (resp.redirected) { window.location.href='/admin'; return; }
        const data = await resp.json();
        renderTable(data); renderPagination(data.total, data.per_page, data.page);
    } catch(e) { document.getElementById('codeTable').innerHTML = '<p style="color:#c62828">加载失败</p>'; }
}

function renderTable(data) {
    if (!data.items.length) { document.getElementById('codeTable').innerHTML = '<p style="color:#aaa;text-align:center;padding:20px">暂无数据</p>'; return; }
    let rows = '';
    data.items.forEach(r => {
        const badge = r.status==='unused'?'badge-unused':'badge-used';
        const label = r.status==='unused'?'未使用':'已使用';
        const tierBadge = r.tier==='vip'?'badge-vip':'badge-free';
        const expireStatus = r.expire_status==='expired'?'badge-expired':(r.expire_status==='soon'?'badge-used':'badge-unused');
        const expireLabel = r.expire_status==='expired'?'已过期':(r.expire_status==='soon'?'即将到期':'正常');
        const action = r.status==='unused'
            ? `<button class="btn-outline" style="padding:4px 8px;font-size:12px;margin-right:4px" onclick="showAssign('${r.code}')">分配</button><button class="btn-danger" style="padding:4px 8px;font-size:12px" onclick="revokeCode('${r.code}')">撤销</button>`
            : '-';
        rows += `<tr>
            <td><span class="badge ${badge}">${label}</span></td>
            <td class="code-cell">${r.code}</td>
            <td>${r.phone||'-'}</td>
            <td><span class="badge ${tierBadge}">${r.tier==='vip'?'VIP':'免费'}</span></td>
            <td>${r.expires_at}</td>
            <td><span class="badge ${expireStatus}">${expireLabel}</span></td>
            <td>${r.upgraded_at||'-'}</td>
            <td>${action}</td>
        </tr>`;
    });
    document.getElementById('codeTable').innerHTML = `<table><thead><tr><th>状态</th><th>激活码</th><th>手机号</th><th>等级</th><th>到期日</th><th>到期状态</th><th>升级时间</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderPagination(total, perPage, page) {
    const pages = Math.ceil(total / perPage);
    if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= pages; i++) html += `<button class="${i===page?'active':''}" onclick="loadCodes(${i})">${i}</button>`;
    document.getElementById('pagination').innerHTML = html;
}

async function generateCodes() {
    const count = parseInt(document.getElementById('genCount').value) || 10;
    try {
        const resp = await fetch('/admin/api/free-generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({count, note:document.getElementById('genNote').value.trim()}) });
        const data = await resp.json();
        let html = `<p style="margin-bottom:10px">批次: ${data.batch_id} | 共 ${data.count} 个</p>`;
        data.codes.forEach(c => { html += `<div>${c.code}</div>`; });
        document.getElementById('genResult').innerHTML = html;
        document.getElementById('genModal').classList.add('show');
    } catch(e) { toast('生成失败'); }
}

function showAssign(code) { assignTarget = code; document.getElementById('assignCode').textContent = code; document.getElementById('assignPhone').value = ''; document.getElementById('assignModal').classList.add('show'); }
async function doAssign() {
    const phone = document.getElementById('assignPhone').value.trim();
    if (!/^1\d{10}$/.test(phone)) { toast('请输入正确的11位手机号'); return; }
    try {
        const resp = await fetch('/admin/api/free-assign', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:assignTarget, phone}) });
        const data = await resp.json();
        if (data.success) { toast('分配成功'); document.getElementById('assignModal').classList.remove('show'); loadCodes(currentPage); }
        else { toast(data.error || '分配失败'); }
    } catch(e) { toast('操作失败'); }
}

async function revokeCode(code) {
    if (!confirm('确认撤销此激活码？')) return;
    try {
        const resp = await fetch('/admin/api/free-revoke', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code}) });
        const data = await resp.json();
        data.success ? toast('撤销成功') : toast(data.error); loadCodes(currentPage);
    } catch(e) { toast('操作失败'); }
}

function copyGenResult() { navigator.clipboard.writeText(document.getElementById('genResult').innerText).then(() => toast('已复制')); }
async function exportCSV() { const r = await fetch('/admin/api/export-free'); const b = await r.blob(); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'free_codes.csv'; a.click(); }
async function logout() { await fetch('/admin/api/logout',{method:'POST'}); window.location.href='/admin'; }
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
loadCodes(1);
</script>
</body>
</html>
