<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 仪表盘</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6fa; min-height: 100vh; }
nav { background: #1a1a2e; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; color: white; }
nav h2 { font-size: 18px; }
nav .links { display: flex; gap: 24px; }
nav .links a { color: #aaa; text-decoration: none; font-size: 14px; transition: color 0.2s; }
nav .links a:hover, nav .links a.active { color: white; }
nav button { background: #e74c3c; color: white; border: none; border-radius: 6px; padding: 6px 16px; cursor: pointer; font-size: 13px; }
.container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-card .label { color: #888; font-size: 13px; margin-bottom: 4px; }
.stat-card .value { font-size: 32px; font-weight: 700; color: #1a1a2e; }
.stat-card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }
.table-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px; }
.table-card h3 { font-size: 16px; color: #333; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #eee; color: #888; font-size: 13px; font-weight: 500; }
td { padding: 10px 12px; border-bottom: 1px solid #f5f5f5; font-size: 14px; color: #444; }
.badge { padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge-free { background: #e3f2fd; color: #1565c0; }
.badge-vip { background: #fff3e0; color: #e65100; }
.badge-active { background: #e8f5e9; color: #2e7d32; }
.badge-soon { background: #fff8e1; color: #f57f17; }
.badge-expired { background: #ffebee; color: #c62828; }
.spinner { width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<nav>
    <h2>馃搳 管理后台</h2>
    <div class="links">
        <a href="/admin/dashboard" class="active">仪表盘/a>
        <a href="/admin/vip-codes">VIP码�?�?/a>
        <a href="/admin/free-users">免费用户</a>
    </div>
    <button onclick="logout()">閫€鍑虹櫥褰?/button>
</nav>
<div class="container">
    <div class="stats" id="stats"></div>
    <div class="table-card">
        <h3>馃搵 鏈€杩戝厤璐圭敤鎴?/h3>
        <table id="recentUsers"><tbody><tr><td colspan="6" style="text-align:center;color:#aaa">加载�?..</td></tr></tbody></table>
    </div>
</div>
<script>
function maskPhone(p) { return p ? p : '-'; }
function getBadge(tier) {
    if (tier==='vip') return '<span class="badge badge-vip">VIP</span>';
    return '<span class="badge badge-free">免费</span>';
}
function getExpBadge(s) {
    if (s==='active') return '<span class="badge badge-active">正常</span>';
    if (s==='soon') return '<span class="badge badge-soon">即将到期</span>';
    return '<span class="badge badge-expired">已过�?/span>';
}

async function load() {
    try {
        const resp = await fetch('/admin/api/stats');
        if (resp.status===302||resp.redirected) { window.location.href='/admin'; return; }
        const s = await resp.json();
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="label">总免费用�?/div><div class="value">${s.total_free}</div><div class="sub">鏈懆鏂板 +${s.week_free}</div></div>
            <div class="stat-card"><div class="label">总VIP用户</div><div class="value">${s.total_vip}</div><div class="sub">鏈懆鏂板 +${s.week_vip}</div></div>
            <div class="stat-card"><div class="label">鏈娇鐢╒IP鐮?/div><div class="value">${s.vip_unused}</div><div class="sub">已使�?${s.vip_used}</div></div>
            <div class="stat-card"><div class="label">到期预�?</div><div class="value">${s.soon_expire}</div><div class="sub">已过�?${s.expired}</div></div>`;
        
        const u = await fetch('/admin/api/free-users?page=1');
        const ud = await u.json();
        let rows = '';
        ud.items.slice(0,10).forEach(r => {
            rows += `<tr><td>${r.phone}</td><td>${r.code}</td><td>${getBadge(r.tier)}</td><td>${r.expires_at}</td><td>${getExpBadge(r.expire_status)}</td><td>${r.upgraded_at||'-'}</td></tr>`;
        });
        document.getElementById('recentUsers').innerHTML = `<thead><tr><th>手机�?/th><th>婵€娲荤爜</th><th>等级</th><th>到期�?/th><th>状�??/th><th>升级时间</th></tr></thead><tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:#aaa">暂无数据</td></tr>'}</tbody>`;
    } catch(e) {
        document.getElementById('stats').innerHTML = '<div class="stat-card"><div class="label">错�?</div><div class="value" style="font-size:16px">加载失败</div></div>';
    }
}
async function logout() { await fetch('/admin/api/logout',{method:'POST'}); window.location.href='/admin'; }
load();
</script>
</body>
</html>
