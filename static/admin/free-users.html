<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>з» пј„жӮҠйҚҡеәЎеҪҙ - йҚҸе¶ҲеһӮйҗўг„Ұеҹӣ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6fa; min-height: 100vh; }
nav { background: #1a1a2e; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; color: white; }
nav h2 { font-size: 18px; }
nav .links { display: flex; gap: 24px; }
nav .links a { color: #aaa; text-decoration: none; font-size: 14px; transition: color 0.2s; }
nav .links a:hover, nav .links a.active { color: white; }
nav button { background: #e74c3c; color: white; border: none; border-radius: 6px; padding: 6px 16px; cursor: pointer; font-size: 13px; }
.container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
.card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card h3 { font-size: 16px; color: #333; margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #eee; color: #888; font-size: 13px; font-weight: 500; }
td { padding: 10px 12px; border-bottom: 1px solid #f5f5f5; font-size: 14px; color: #444; }
.badge { padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge-free { background: #e3f2fd; color: #1565c0; }
.badge-vip { background: #fff3e0; color: #e65100; }
.badge-active { background: #e8f5e9; color: #2e7d32; }
.badge-soon { background: #fff8e1; color: #f57f17; }
.badge-expired { background: #ffebee; color: #c62828; }
.toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
.pagination { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
.pagination button { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; }
.pagination button:disabled { opacity: 0.4; cursor: default; }
.pagination button.active { background: #533483; color: white; border-color: #533483; }
.spinner { width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<nav>
    <h2>йҰғжҮғ йҚҸе¶ҲеһӮйҗўг„Ұеҹӣ</h2>
    <div class="links">
        <a href="/admin/dashboard">жө оҒҮгҖғйҗ©?/a>
        <a href="/admin/vip-codes">VIPйҗ®дҪәо…ёйҗһ?/a>
        <a href="/admin/free-users" class="active">йҚҸе¶ҲеһӮйҗўг„Ұеҹӣ</a>
    </div>
    <button onclick="logout()">й–«вӮ¬йҚ‘иҷ№ж«ҘиӨ°?/button>
</nav>
<div class="container">
    <div class="card">
        <h3>йҰғжҗө йҗўг„ҰеҹӣйҚ’жҘ„гҖғ</h3>
        <div class="toolbar" style="color:#888;font-size:13px">
            йҺ¬жҳҸо…ё: <strong id="totalCount">-</strong> жөң?        </div>
        <div id="userTable"><div class="spinner"></div></div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script>
let currentPage = 1;

function getTierBadge(t) { return t==='vip'?'<span class="badge badge-vip">VIP</span>':'<span class="badge badge-free">йҚҸе¶ҲеһӮ</span>'; }
function getExpBadge(s) {
    if (s==='active') return '<span class="badge badge-active">е§қпҪ…зҲ¶</span>';
    if (s==='soon') return '<span class="badge badge-soon">йҚ—еҶІзҡўйҚ’зүҲж№Ў</span>';
    return '<span class="badge badge-expired">е®ёиҢ¶з№ғйҸҲ?/span>';
}

async function loadUsers(page) {
    currentPage = page;
    try {
        const resp = await fetch('/admin/api/free-users?page=' + page);
        if (resp.status===302||resp.redirected) { window.location.href='/admin'; return; }
        const data = await resp.json();
        document.getElementById('totalCount').textContent = data.total;
        
        if (!data.items.length) {
            document.getElementById('userTable').innerHTML = '<p style="color:#aaa;text-align:center;padding:20px">йҸҶеӮӣжЈӨйҗўг„Ұеҹӣ</p>';
            return;
        }
        let rows = '';
        data.items.forEach(r => {
            rows += `<tr>
                <td>${r.phone}</td>
                <td style="font-family:monospace;font-size:12px">${r.code}</td>
                <td>${getTierBadge(r.tier)}</td>
                <td>${r.created_at}</td>
                <td>${r.expires_at}</td>
                <td>${getExpBadge(r.expire_status)}</td>
                <td>${r.upgraded_at||'-'}</td>
            </tr>`;
        });
        document.getElementById('userTable').innerHTML = `<table><thead><tr><th>йҺөе¬«жәҖйҚҷ?/th><th>е©өвӮ¬еЁІиҚӨзҲң</th><th>з»ӣеӨҢйӘҮ</th><th>е©өвӮ¬еЁІз»ҳжӨӮй—Ӯ?/th><th>йҚ’зүҲж№ЎйҸғ?/th><th>йҗҳиҲөвӮ¬?/th><th>йҚ—еӣ©йӘҮйҸғе •жЈҝ</th></tr></thead><tbody>${rows}</tbody></table>`;
        
        const pages = Math.ceil(data.total / data.per_page);
        if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
        let ph = '';
        for (let i = 1; i <= pages; i++) {
            ph += `<button class="${i===page?'active':''}" onclick="loadUsers(${i})" ${i===page?'disabled':''}>${i}</button>`;
        }
        document.getElementById('pagination').innerHTML = ph;
    } catch(e) { document.getElementById('userTable').innerHTML = '<p style="color:#c62828">йҚ”зҠәжөҮжҫ¶иҫ«и§Ұ</p>'; }
}

async function logout() { await fetch('/admin/api/logout',{method:'POST'}); window.location.href='/admin'; }
loadUsers(1);
</script>
</body>
</html>
